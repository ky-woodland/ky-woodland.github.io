
<!DOCTYPE html>

<head>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
	<link rel="stylesheet" href="static/stylesheets/styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<div id="wrapper">


<div class="container">

<h1>Valentine's Day Coupons</h1>
<img src="static/images/top-bunny.png" style="display: block; margin: 0 auto" width="100px">

  <div class="row mt-3">   

    <div class="col">
      <div class="card-box">
        <div class="num">10</div>
      	<div class="row m-0">
	      	<div class="col-3" style="display: flex; align-items: center;">
	      		<img src="static/images/red_lv1.png" class="img-fluid" style="min-width: 60px">
	      	</div>
	      	<div class="col my-auto">
	      		<h2>kiss</h2>
	      		<p>i will come give a kiss. anytime. any place.</p>
	      	</div>
        </div>
      </div>
    </div>

  </div>

  <div class="row mt-3">   

    <div class="col">
      <div class="card-box">
        <div class="num">3</div>
        <div class="row m-0">
          <div class="col-3" style="display: flex; align-items: center;">
            <img src="static/images/red_lv1.png" class="img-fluid" style="min-width: 60px">
          </div>
          <div class="col my-auto">
            <h2>game time</h2>
            <p>i will play a game of your choice for a minimum of one (1) hour.</p>
          </div>
        </div>
      </div>
    </div>

  </div> 

  <div class="row mt-3">   

    <div class="col">
      <div class="card-box">
        <div class="num">1</div>
        <div class="row m-0">
          <div class="col-3" style="display: flex; align-items: center;">
            <img src="static/images/red_lv1.png" class="img-fluid" style="min-width: 60px">
          </div>
          <div class="col my-auto">
            <h2>breakfast in bed</h2>
            <p>i will cook and bring you a lovingly-made breakfast in bed <3</p>
          </div>
        </div>
      </div>
    </div>

  </div>

</div>

</div>

</body>
</html>
