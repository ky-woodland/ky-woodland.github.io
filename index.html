<!DOCTYPE html>
<head>
<style>
#cs {
  display: none;
}

.result {
  background-color: white;
  color: black;
}

#color-gen {
  width: 200px;
  height: 200px;
}
</style>
</head>

<body>

<div class="thumbnail">
  <div class="preview"></div>
  <img id="imageguy" src="">
</div>

<canvas id="cs"></canvas>

<p id="status">Loading image...</p>

<button id="color-type" onclick="getColorType()">Roll for Color Type FIRST</button><br><br>
<div id="color-type-box">
  <span>Color Type: </span>
</div>
<button onclick="getYellow()">Click to generate Standard Accent Color (Yellow Shades)</button><br>
<button onclick="getColor()">If Special, Click This</button><br><br>
<button id="getColor" onclick="pickColor()">Generate From Current Palette</button>

<div class="result">
  <span>HEX: </span>
  <br><br>
  <span>RGB: </span>
</div>

<div id="color-gen"></div>

<script>
const canvas = document.querySelector('#cs');
const ctx = canvas.getContext('2d');
const imgEl = document.getElementById('imageguy');
const statusEl = document.getElementById('status');
const result = document.querySelector('.result');
const preview = document.querySelector('.preview');

// All image filenames live in the images/ folder next to this HTML file.
// Add or remove filenames here as needed.
const SPECIAL_IMAGES = [
  'images/chao_color_blue.jpg',
  'images/chao_color_brown.jpg',
  'images/chao_color_gray.jpg',
  'images/chao_color_green.jpg',
  'images/chao_color_lime.jpg',
  'images/chao_color_orange.jpg',
  'images/chao_color_pink.jpg',
  'images/chao_color_purple.jpg',
  'images/chao_color_red.jpg',
  'images/chao_color_skyblue.jpg',
  'images/chao_color_yellow.jpg',
];

const YELLOW_IMAGE = 'images/chao_yellow_accents.png';
const DEFAULT_IMAGE = 'images/chao_starter_colors.png';

// Load a local image. Local files don't have CORS issues,
// but setting crossOrigin = "anonymous" is still good practice
// in case the page is ever served over HTTP.
function loadImage(src) {
  statusEl.textContent = 'Loading image…';
  const newImg = new Image();
  newImg.crossOrigin = 'anonymous'; // must be set BEFORE src
  newImg.onload = function () {
    imgEl.src = newImg.src;
    statusEl.textContent = 'Ready!';
  };
  newImg.onerror = function () {
    statusEl.textContent = 'Could not load image: ' + src;
  };
  newImg.src = src;
}

// Roll to get the color type of the chao
function getColorType() {
  var colorType;
  var randomNum = Math.floor(Math.random() * 100) + 1;
  var randomNumSpecial;

  if (randomNum < 96) {
    colorType = 'Standard';
  } else {
    randomNumSpecial = Math.floor(Math.random() * 100) + 1;
    colorType = randomNumSpecial < 76 ? 'Mono-tone' : 'Two-tone';
  }

  document.getElementById('color-type-box').innerHTML = 'Color Type: ' + colorType;
  console.log(randomNum, randomNumSpecial, colorType);
}

function getColor() {
  const src = SPECIAL_IMAGES[Math.floor(Math.random() * SPECIAL_IMAGES.length)];
  loadImage(src);
}

function getYellow() {
  loadImage(YELLOW_IMAGE);
}

function pickColor() {
  if (!imgEl.complete || imgEl.naturalWidth === 0) {
    statusEl.textContent = 'Image not ready yet — please wait!';
    return;
  }

  canvas.width = imgEl.naturalWidth;
  canvas.height = imgEl.naturalHeight;
  ctx.drawImage(imgEl, 0, 0);

  const x = Math.floor(Math.random() * canvas.width);
  const y = Math.floor(Math.random() * canvas.height);

  try {
    const p = ctx.getImageData(x, y, 1, 1).data;
    const hex = rgbToHex(p[0], p[1], p[2]);
    result.innerHTML =
      '<span>HEX: ' + hex + '</span><br><br>' +
      '<span>RGB: rgb(' + p[0] + ', ' + p[1] + ', ' + p[2] + ')</span>';
    document.getElementById('color-gen').style.background = hex;
    statusEl.textContent = 'Picked from (' + x + ', ' + y + ')';
  } catch (e) {
    statusEl.textContent = 'Error reading pixel: ' + e.message;
  }
}

// Mouse preview
imgEl.addEventListener('mousemove', function (e) {
  if (!imgEl.complete || imgEl.naturalWidth === 0) return;

  var rect = imgEl.getBoundingClientRect();
  var scaleX = imgEl.naturalWidth / imgEl.offsetWidth;
  var scaleY = imgEl.naturalHeight / imgEl.offsetHeight;
  var x = Math.floor((e.clientX - rect.left) * scaleX);
  var y = Math.floor((e.clientY - rect.top) * scaleY);

  canvas.width = imgEl.naturalWidth;
  canvas.height = imgEl.naturalHeight;
  ctx.drawImage(imgEl, 0, 0);

  try {
    var p = ctx.getImageData(x, y, 1, 1).data;
    preview.style.background = rgbToHex(p[0], p[1], p[2]);
  } catch (e) {}
});

function componentToHex(c) {
  var hex = c.toString(16);
  return hex.length == 1 ? '0' + hex : hex;
}

function rgbToHex(r, g, b) {
  return '#' + componentToHex(r) + componentToHex(g) + componentToHex(b);
}

// Load default image on page load
loadImage(DEFAULT_IMAGE);
</script>

</body>
</html>
